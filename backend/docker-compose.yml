
services:
  db:
    image: postgres:16
    container_name: youngcon-db
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    volumes:
      - users_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./YoungConService
      dockerfile: Dockerfile
    container_name: youngcon-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=usersdb;Username=postgres;Password=postgres"
      JwtSettings__Secret: "SUPER_SECRET_KEY_123456789_SUPER_SECRET"
      JwtSettings__Issuer: "UsersService"
      JwtSettings__Audience: "BankClients"
      JwtSettings__ExpiryMinutes: "60"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  users_data:
